<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanCrop</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>CleanCrop</h2>
      <span>Management System</span>
    </div>
    <nav>
      <a data-view="dashboard">
        <span class="icon">🏠</span> Dashboard
      </a>
      <a data-view="clients">
        <span class="icon">🏢</span> Clients
      </a>
      <a data-view="sites">
        <span class="icon">📍</span> Sites
      </a>
      <a data-view="shifts">
        <span class="icon">🗓</span> Shifts
      </a>
      <a data-view="employees">
        <span class="icon">👷</span> Employees
      </a>
      <a data-view="replacements">
        <span class="icon">🔄</span> Replacements
      </a>
      <a data-view="payroll">
        <span class="icon">💰</span> Payroll &amp; Invoicing
      </a>
    </nav>
    <div class="sidebar-footer">CleanCrop v1.0 · Jun 2026</div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div id="topbar-title"></div>
    </div>
    <div class="page" id="page"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
